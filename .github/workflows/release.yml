name: Build & Release YouCord

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Equicord renderer (standalone)
        run: pnpm buildStandalone

      - name: Restore cached Discord
        id: cache-discord
        uses: actions/cache@v4
        with:
          path: .discord
          key: discord-win-stable

      - name: Download & install Discord
        if: steps.cache-discord.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $setupUrl = "https://discord.com/api/download/stable?platform=win"
          $setupPath = "$env:RUNNER_TEMP\DiscordSetup.exe"
          Write-Host "Downloading DiscordSetup.exe..."
          Invoke-WebRequest -Uri $setupUrl -OutFile $setupPath -MaximumRedirection 5
          Write-Host "Installing Discord silently..."
          & $setupPath /s
          Start-Sleep -Seconds 30
          New-Item -ItemType Directory -Path ".discord" -Force | Out-Null
          Copy-Item "$env:LOCALAPPDATA\Discord\app-*" ".discord\" -Recurse -Force
        timeout-minutes: 10

      - name: Set DISCORD_PATH
        shell: pwsh
        run: |
          $f = Get-ChildItem ".discord\app-*" -Directory | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
          echo "DISCORD_PATH=$f" >> $env:GITHUB_ENV

      - name: Build YouCord from Discord
        run: node electron-builder.config.cjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package release/youcord-dist
        shell: pwsh
        run: |
          Compress-Archive -Path "release\youcord-dist\*" -DestinationPath "youcord-dist.zip" -Force

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            youcord-dist.zip
            release/youcord-dist/Discord.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
