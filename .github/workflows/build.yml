name: Release
on:
    push:
        branches:
            - main

env:
    FORCE_COLOR: true
    GH_TOKEN: ${{ github.token }}

permissions:
    contents: write

jobs:
    Build:
        name: Build Equicord
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.30.3

            - name: Use Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateEquicordPluginJson dist/equicordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Collect files to be released
              run: |
                  cd dist
                  mkdir release

                  if ls browser/browser.* > /dev/null 2>&1; then cp browser/browser.* release; fi
                  if ls Equicord.user.{js,js.LEGAL.txt} > /dev/null 2>&1; then cp Equicord.user.{js,js.LEGAL.txt} release; fi

                  cp *.{json,zip,asar} release 2>/dev/null || true

                  if ls desktop/* > /dev/null 2>&1; then cp desktop/* release; fi

                  find release -size 0 -delete 2>/dev/null || true
                  rm -f release/package.json release/*.map

            - name: Upload Equicord Stable
              run: |
                  gh release upload latest --clobber dist/release/*


